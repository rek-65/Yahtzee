name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Recreate upload keystore
        shell: pwsh
        env:
          YAHTZEE_UPLOAD_STORE_FILE_BASE64: ${{ secrets.YAHTZEE_UPLOAD_STORE_FILE_BASE64 }}
        run: |
          [System.IO.File]::WriteAllBytes(
            "${{ runner.temp }}\rekcode_yahtzee_key",
            [System.Convert]::FromBase64String($env:YAHTZEE_UPLOAD_STORE_FILE_BASE64)
          )    

      - name: Build release artifacts
        run: .\gradlew.bat :composeApp:prepareReleaseWindowsArtifacts
        env:
          GPR_USER: ${{ secrets.GPR_USER }}
          GPR_KEY: ${{ secrets.GPR_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ORG_GRADLE_PROJECT_YAHTZEE_UPLOAD_STORE_FILE: ${{ runner.temp }}\rekcode_yahtzee_key
          ORG_GRADLE_PROJECT_YAHTZEE_UPLOAD_STORE_PASSWORD: ${{ secrets.YAHTZEE_UPLOAD_STORE_PASSWORD }}
          ORG_GRADLE_PROJECT_YAHTZEE_UPLOAD_KEY_ALIAS: ${{ secrets.YAHTZEE_UPLOAD_KEY_ALIAS }}
          ORG_GRADLE_PROJECT_YAHTZEE_UPLOAD_KEY_PASSWORD: ${{ secrets.YAHTZEE_UPLOAD_KEY_PASSWORD }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: composeApp/build/release-artifacts/windows/

  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Recreate upload keystore
        env:
          YAHTZEE_UPLOAD_STORE_FILE_BASE64: ${{ secrets.YAHTZEE_UPLOAD_STORE_FILE_BASE64 }}
        run: |
          echo "$YAHTZEE_UPLOAD_STORE_FILE_BASE64" | base64 --decode > "${{ runner.temp }}/rekcode_yahtzee_key"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Android release artifacts
        run: ./gradlew :composeApp:prepareReleaseAndroidArtifacts
        env:
          GPR_USER: ${{ secrets.GPR_USER }}
          GPR_KEY: ${{ secrets.GPR_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ORG_GRADLE_PROJECT_YAHTZEE_UPLOAD_STORE_FILE: ${{ runner.temp }}/rekcode_yahtzee_key
          ORG_GRADLE_PROJECT_YAHTZEE_UPLOAD_STORE_PASSWORD: ${{ secrets.YAHTZEE_UPLOAD_STORE_PASSWORD }}
          ORG_GRADLE_PROJECT_YAHTZEE_UPLOAD_KEY_ALIAS: ${{ secrets.YAHTZEE_UPLOAD_KEY_ALIAS }}
          ORG_GRADLE_PROJECT_YAHTZEE_UPLOAD_KEY_PASSWORD: ${{ secrets.YAHTZEE_UPLOAD_KEY_PASSWORD }}

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-artifacts
          path: composeApp/build/release-artifacts/android/

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Recreate upload keystore
        env:
          YAHTZEE_UPLOAD_STORE_FILE_BASE64: ${{ secrets.YAHTZEE_UPLOAD_STORE_FILE_BASE64 }}
        run: |
          echo "$YAHTZEE_UPLOAD_STORE_FILE_BASE64" | base64 --decode > "${{ runner.temp }}/rekcode_yahtzee_key"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Linux release artifacts
        run: ./gradlew :composeApp:prepareReleaseLinuxArtifacts
        env:
          GPR_USER: ${{ secrets.GPR_USER }}
          GPR_KEY: ${{ secrets.GPR_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ORG_GRADLE_PROJECT_YAHTZEE_UPLOAD_STORE_FILE: ${{ runner.temp }}/rekcode_yahtzee_key
          ORG_GRADLE_PROJECT_YAHTZEE_UPLOAD_STORE_PASSWORD: ${{ secrets.YAHTZEE_UPLOAD_STORE_PASSWORD }}
          ORG_GRADLE_PROJECT_YAHTZEE_UPLOAD_KEY_ALIAS: ${{ secrets.YAHTZEE_UPLOAD_KEY_ALIAS }}
          ORG_GRADLE_PROJECT_YAHTZEE_UPLOAD_KEY_PASSWORD: ${{ secrets.YAHTZEE_UPLOAD_KEY_PASSWORD }}

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: composeApp/build/release-artifacts/linux/

  build-ios-framework:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build iOS Arm64 framework
        run: ./gradlew :composeApp:linkReleaseFrameworkIosArm64

      - name: Build iOS Simulator framework
        run: ./gradlew :composeApp:linkReleaseFrameworkIosSimulatorArm64

      - name: Upload iOS frameworks
        uses: actions/upload-artifact@v4
        with:
          name: ios-frameworks
          path: |
            composeApp/build/bin/iosArm64/releaseFramework/
            composeApp/build/bin/iosSimulatorArm64/releaseFramework/

  release:
    needs:
      - build-android
      - build-windows
      - build-linux
      - build-ios-framework
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download Android artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-artifacts
          path: artifacts/android

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-artifacts
          path: artifacts/windows

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-artifacts
          path: artifacts/linux

      - name: Extract version
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Yahtzee v${{ steps.version.outputs.VERSION }}
          tag_name: ${{ github.ref }}
          files: |
            artifacts/android/*.apk
            artifacts/windows/*.exe
            artifacts/linux/*.deb
            artifacts/linux/*.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}